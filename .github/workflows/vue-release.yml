name: Vue Release

on:
  push:
    tags:
      - 'vue@v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/vue
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to NPM
        run: npm publish --provenance --access public

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/vue@v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DiscoUI Vue v${{ steps.get_version.outputs.VERSION }}
          body: |
            ```bash
            npm install @discoui/vue@${{ steps.get_version.outputs.VERSION }}
            ```
            
            **NPM:** https://www.npmjs.com/package/@discoui/vue
          files: |
            packages/vue/dist/*
          draft: false
          prerelease: false
