name: Unified Nightly Build

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  nightly-packages:
    name: Nightly ${{ matrix.package.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - name: core
            dir: packages/core
          - name: vue
            dir: packages/vue
          - name: capacitor
            dir: packages/capacitor
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Setup Java/Android (Capacitor Only)
        if: matrix.package.name == 'capacitor'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      
      - name: Setup Android SDK (Capacitor Only)
        if: matrix.package.name == 'capacitor'
        uses: android-actions/setup-android@v3

      - name: Generate Nightly Version
        id: nightly_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          NIGHTLY_VERSION="${VERSION}-nightly.${SHORT_SHA}"
          npm version $NIGHTLY_VERSION --no-git-tag-version
          echo "VERSION=$NIGHTLY_VERSION" >> $GITHUB_OUTPUT
        working-directory: ${{ matrix.package.dir }}

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.package.dir }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.package.dir }}

      - name: Publish to NPM (Nightly Tag)
        run: npm publish --tag nightly --access public
        working-directory: ${{ matrix.package.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Archive
        run: |
          if [ "${{ matrix.package.name }}" == "capacitor" ]; then
            zip -r ../../discoui-${{ matrix.package.name }}-nightly.zip dist src android/src android/build.gradle
          else
            zip -r ../../discoui-${{ matrix.package.name }}-nightly.zip dist
          fi
        working-directory: ${{ matrix.package.dir }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package.name }}-nightly-artifact
          path: discoui-${{ matrix.package.name }}-nightly.zip

  github-nightly-release:
    name: Update GitHub Nightly
    runs-on: ubuntu-latest
    needs: nightly-packages
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Update Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          body: |
            **Last Updated:** ${{ github.event.repository.updated_at }}
            **Commit:** ${{ github.sha }}
            
            This nightly release is available on NPM via the `@nightly` tag:
            
            ```bash
            npm install @discoui-org/core@nightly
            npm install @discoui-org/vue@nightly
            npm install @discoui-org/capacitor@nightly
            ```
            
            Or download the artifacts below.
          prerelease: true
          files: artifacts/*
