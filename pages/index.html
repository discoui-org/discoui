<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/assets/dui.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiscoUI | The Lumia Portal</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <div id="portal-root">
    <!-- Lumia Device (Original Emulator Logic) -->
    <div id="disco-device">
      <button class="back-hit" aria-label="Back"></button>
      <button class="home-hit" aria-label="Home"></button>
      <iframe id="heroDemo" src="/demo.html" title="DiscoUI Live Demo" frameborder="0"></iframe>
      <iframe id="sandboxFrame" title="DiscoUI Sandbox" frameborder="0"></iframe>
    </div>

    <!-- Windows 8 Style Charm Bar (Right) -->
    <div class="charms-bar">
      <div class="charms-item" id="toggleFullscreen">
        <div class="charms-icon mif-enlarge"></div>
        <div class="charms-label">Fullscreen</div>
      </div>
      <div class="charms-item" id="openSandbox">
        <div class="charms-icon mif-code"></div>
        <div class="charms-label">Sandbox</div>
      </div>
      <a href="./docs/index.md" class="charms-item">
        <div class="charms-icon mif-file-text"></div>
        <div class="charms-label">Docs</div>
      </a>
    </div>

    <!-- Windows 8 Style Time Panel (Bottom Left) -->
    <div class="charms-time-panel">
      <div class="time-content">
        <h1 class="disco-title">DiscoUI</h1>
        <p class="disco-subtitle">Mobile Shell SDK</p>
      </div>
    </div>

    <!-- Sandbox Side Bar (Dual-Tab) -->
    <aside id="sandboxBar" class="sandbox-bar">
      <div class="sandbox-header">
        <h2>Live Sandbox</h2>
        <button class="close-sandbox" id="closeSandbox">&times;</button>
      </div>

      <div class="sandbox-tabs">
        <button class="tab-btn active" data-tab="html">HTML</button>
        <button class="tab-btn" data-tab="js">JavaScript</button>
      </div>

      <div class="editor-wrapper">
        <div id="htmlTab" class="tab-content active">
          <textarea id="htmlEditor" spellcheck="false"><!-- DiscoUI UI Structure -->
<disco-frame>
  <disco-single-page app-title="SANDBOX">
    <disco-button id="helloBtn">Hello World</disco-button>
  </disco-single-page>
</disco-frame></textarea>
        </div>
        <div id="jsTab" class="tab-content">
          <textarea id="jsEditor" spellcheck="false">// DiscoUI Application Logic
// 1. Initialize the App with custom scale and accent
const app = new DiscoApp({
  accent: '#008a00',
  theme: 'dark'
});
app.scale = 1.025;
app.launch(document.body);

// 2. Initialize Navigation
const frame = document.querySelector('disco-frame');
const page = frame.querySelector('disco-single-page');
await frame.navigate(page);

// 3. Simple Interaction
const btn = document.getElementById('helloBtn');
btn?.addEventListener('click', () => {
  alert('DiscoUI: Interaction working!');
});</textarea>
        </div>
      </div>

      <div class="sandbox-actions">
        <button class="btn-primary" id="runSandbox">Run Code</button>
      </div>
    </aside>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
