name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths: ['pages/**', 'assets/**', 'packages/core/src/**', 'packages/core/dist/**']

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: pages/package-lock.json

      - name: Build Core
        run: npm run build -w @discoui/core

      - name: Build Portal
        working-directory: pages
        run: |
          npm install
          npm run build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
