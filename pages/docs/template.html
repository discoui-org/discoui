<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiscoUI Docs | {{TITLE}}</title>
  <link rel="stylesheet" href="../src/style.css">
  <style>
    :root {
      --accent-color: #008a00;
      --bg-color: #000;
      --sidebar-width: 300px;
    }

    body {
      background: var(--bg-color);
      color: #fff;
      margin: 0;
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar Navigation */
    .docs-sidebar {
      width: var(--sidebar-width);
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      background: #111;
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      padding: 40px 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 0 40px 40px 40px;
    }

    .sidebar-brand {
      font-size: 24px;
      font-weight: 200;
      color: var(--accent-color);
      text-decoration: none;
    }

    .nav-group-title {
      padding: 24px 40px 8px 40px;
      font-size: 11px;
      font-weight: 600;
      opacity: 0.3;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: default;
    }

    /* Collapsible Group Styling */
    .nav-group-details {
      border: none;
    }
    .nav-group-details summary {
      list-style: none;
      outline: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .nav-group-details summary::-webkit-details-marker {
      display: none;
    }
    .nav-group-details summary:hover {
      opacity: 0.8;
    }
    .nav-group-details summary .nav-group-title {
      padding-bottom: 12px;
    }
    .nav-group-content {
      display: flex;
      flex-direction: column;
    }

    .nav-link {
      padding: 12px 40px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 300;
      opacity: 0.6;
      transition: all 0.2s;
    }

    .nav-link:hover {
      opacity: 1;
      background: rgba(255, 255, 255, 0.03);
    }

    .nav-link.active {
      opacity: 1;
      color: var(--accent-color);
      border-left: 4px solid var(--accent-color);
      padding-left: 36px;
      background: rgba(0, 138, 0, 0.05);
    }

    /* Main Content Area */
    .docs-main {
      flex: 1;
      margin-left: var(--sidebar-width);
      padding: 80px 120px;
      max-width: 1000px;
    }

    .markdown-content {
      line-height: 1.7;
      font-size: 17px;
      font-weight: 300;
    }

    .markdown-content h1 {
      font-weight: 100;
      font-size: 64px;
      margin: 0 0 40px 0;
      color: #fff;
    }

    .markdown-content h2 {
      font-weight: 200;
      font-size: 32px;
      margin: 60px 0 24px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 12px;
    }

    .markdown-content h3 {
      font-weight: 300;
      font-size: 22px;
      margin: 40px 0 16px 0;
      color: var(--accent-color);
    }

    .markdown-content code {
      background: rgba(255, 255, 255, 0.07);
      padding: 2px 6px;
      border-radius: 2px;
      font-family: 'Consolas', monospace;
      font-size: 0.9em;
      color: #00ff00;
    }

    .markdown-content pre {
      background: #0a0a0a;
      padding: 32px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      overflow-x: auto;
      margin: 32px 0;
      border-radius: 4px;
    }

    .markdown-content pre code {
      background: none;
      padding: 0;
      color: #eee;
      font-size: 14px;
    }

    .markdown-content p {
      margin-bottom: 24px;
      opacity: 0.7;
    }

    .markdown-content ul,
    .markdown-content ol {
      margin-bottom: 32px;
      padding-left: 24px;
    }

    .markdown-content li {
      margin-bottom: 12px;
      opacity: 0.7;
    }

    .markdown-content strong {
      font-weight: 600;
      opacity: 1;
      color: #fff;
    }

    /* Home Button */
    .back-home {
      position: fixed;
      top: 40px;
      right: 40px;
      z-index: 100;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
      text-decoration: none;
      opacity: 0.3;
      transition: opacity 0.2s;
    }

    .back-home:hover {
      opacity: 1;
    }

    @media (max-width: 1000px) {
      .docs-sidebar {
        display: none;
      }

      .docs-main {
        margin-left: 0;
        padding: 40px;
      }
    }
  </style>
</head>

<body>
  <nav class="docs-sidebar">
    {{SIDEBAR}}
  </nav>

  <main class="docs-main">
    <a href="/" class="back-home">Close Docs</a>
    <article class="markdown-content">
      {{CONTENT}}
    </article>
  </main>
</body>

</html>
