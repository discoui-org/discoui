name: Unified Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3)'
        required: true
        default: '1.0.0'

permissions:
  contents: write
  id-token: write

jobs:
  release-packages:
    name: Release ${{ matrix.package.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - name: core
            dir: packages/core
          - name: vue
            dir: packages/vue
          - name: capacitor
            dir: packages/capacitor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      
      - name: Setup Java/Android (Capacitor Only)
        if: matrix.package.name == 'capacitor'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      
      - name: Setup Android SDK (Capacitor Only)
        if: matrix.package.name == 'capacitor'
        uses: android-actions/setup-android@v3

      - name: Sync version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "FINAL_VERSION=$VERSION" >> $GITHUB_ENV
          npm version $VERSION --no-git-tag-version
        working-directory: ${{ matrix.package.dir }}

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.package.dir }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.package.dir }}

      - name: Publish to NPM
        run: npm publish --provenance --access public
        working-directory: ${{ matrix.package.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Archive
        run: |
          if [ "${{ matrix.package.name }}" == "capacitor" ]; then
            zip -r ../../discoui-${{ matrix.package.name }}-${{ github.ref_name }}.zip dist src android/src android/build.gradle
          else
            zip -r ../../discoui-${{ matrix.package.name }}-${{ github.ref_name }}.zip dist
          fi
        working-directory: ${{ matrix.package.dir }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package.name }}-artifact
          path: discoui-${{ matrix.package.name }}-${{ github.ref_name }}.zip

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: release-packages
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: DiscoUI ${{ github.event.inputs.version || github.ref_name }}
          body: |
            ## DiscoUI Release ${{ github.event.inputs.version || github.ref_name }}
            
            ### Packages:
            - `@discoui-org/core`
            - `@discoui-org/vue`
            - `@discoui-org/capacitor`
            
            ```bash
            npm install @discoui-org/core@${{ github.event.inputs.version || github.ref_name }}
            npm install @discoui-org/vue@${{ github.event.inputs.version || github.ref_name }}
            npm install @discoui-org/capacitor@${{ github.event.inputs.version || github.ref_name }}
            ```
          files: artifacts/*
          draft: false
          prerelease: false
