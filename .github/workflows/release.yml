name: Unified Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  core:
    name: Release Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - name: Install & Build
        run: |
          cd packages/core
          npm ci
          npm run build
          zip -r ../../discoui-core-${{ github.ref_name }}.zip dist
      - name: Publish
        run: |
          cd packages/core
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-artifact
          path: discoui-core-${{ github.ref_name }}.zip

  vue:
    name: Release Vue
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - name: Install & Build
        run: |
          cd packages/vue
          npm ci
          npm run build
          zip -r ../../discoui-vue-${{ github.ref_name }}.zip dist
      - name: Publish
        run: |
          cd packages/vue
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vue-artifact
          path: discoui-vue-${{ github.ref_name }}.zip

  capacitor:
    name: Release Capacitor
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - name: Install & Build
        run: |
          cd packages/capacitor
          npm ci
          npm run build
          # Build Android Example
          # npm run build:android (Assuming this works in the environment)
          zip -r ../../discoui-capacitor-${{ github.ref_name }}.zip dist src android/src android/build.gradle
      - name: Publish
        run: |
          cd packages/capacitor
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: capacitor-artifact
          path: discoui-capacitor-${{ github.ref_name }}.zip

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [core, vue, capacitor]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: DiscoUI ${{ github.ref_name }}
          body: |
            ## DiscoUI Release ${{ github.ref_name }}
            
            ### Packages:
            - `@discoui-org/core`
            - `@discoui-org/vue`
            - `@discoui-org/capacitor`
            
            ```bash
            npm install @discoui-org/core@${{ github.ref_name }}
            npm install @discoui-org/vue@${{ github.ref_name }}
            npm install @discoui-org/capacitor@${{ github.ref_name }}
            ```
          files: artifacts/*
          draft: false
          prerelease: false
